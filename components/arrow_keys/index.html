<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: transparent; overflow: hidden; }
  #hint {
    font-family: monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 0;
  }
  .key {
    display: inline-block;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 1px 6px;
    color: #888;
    font-size: 11px;
  }
</style>
</head>
<body>
<div id="hint">
  <span class="key">←</span> left &nbsp;&nbsp;
  <span class="key">→</span> right
</div>

<script src="streamlit-component-lib.js"></script>
<script>
// This component injects a keydown listener into the TOP-LEVEL parent window
// (the actual browser tab), bypassing all iframe sandbox restrictions.
// It does this by writing a <script> tag into the parent document directly,
// which works because Streamlit serves everything from the same origin.

(function() {
  var lastKey = null;
  var lastTime = 0;

  function sendToStreamlit(key) {
    var now = Date.now();
    // Debounce: ignore if same key within 300ms (prevents held-key spam)
    if (key === lastKey && now - lastTime < 300) return;
    lastKey = key;
    lastTime = now;
    Streamlit.setComponentValue(key);
  }

  function attachToParent() {
    try {
      // Try to attach directly to parent window (same-origin)
      var parentDoc = window.parent.document;
      
      if (parentDoc.__arrowKeyListenerAttached) return;
      parentDoc.__arrowKeyListenerAttached = true;

      parentDoc.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          sendToStreamlit('left');
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          sendToStreamlit('right');
        }
      });

    } catch(err) {
      // Cross-origin fallback: focus this iframe and listen locally
      window.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          sendToStreamlit('left');
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          sendToStreamlit('right');
        }
      });
    }
  }

  function onRender(event) {
    attachToParent();
    // Also keep local listener as backup, auto-focus this iframe
    document.body.setAttribute('tabindex', '-1');
    document.body.focus();
    Streamlit.setFrameHeight(28);
  }

  Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
  Streamlit.setComponentReady();
})();
</script>
</body>
</html>
